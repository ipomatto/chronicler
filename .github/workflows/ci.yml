name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  distiller:
    name: distiller (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: distiller

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: distiller/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
