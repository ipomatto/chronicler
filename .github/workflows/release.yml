name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and release (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from distiller/package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./distiller/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${VERSION} already exists — skipping release (version was not bumped)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: distiller/package-lock.json

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        working-directory: distiller
        run: npm ci

      - name: Build and package (electron-builder)
        if: steps.tag_check.outputs.exists == 'false'
        working-directory: distiller
        run: npm run package

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release (draft)
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: distiller/dist/*.exe
