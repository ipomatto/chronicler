<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1a1a2e"/>

  <!-- Book body (right page block) -->
  <rect x="88" y="62" width="74" height="100" rx="4" ry="4" fill="#0f3460"/>

  <!-- Book spine -->
  <rect x="82" y="58" width="14" height="108" rx="3" ry="3" fill="#e94560"/>

  <!-- Page lines on right block -->
  <line x1="100" y1="85"  x2="152" y2="85"  stroke="#16213e" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="152" y2="100" stroke="#16213e" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="152" y2="115" stroke="#16213e" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="152" y2="130" stroke="#16213e" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="145" x2="140" y2="145" stroke="#16213e" stroke-width="3" stroke-linecap="round"/>

  <!-- Left page (open book effect) -->
  <rect x="50" y="62" width="40" height="100" rx="4" ry="4" fill="#0a2540"/>

  <!-- Page lines on left block -->
  <line x1="56" y1="85"  x2="84" y2="85"  stroke="#0f3460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="100" x2="84" y2="100" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="115" x2="84" y2="115" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="130" x2="84" y2="130" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="145" x2="72" y2="145" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Star / quill accent (magical D&D feel) -->
  <polygon points="128,170 133,183 147,183 136,191 140,204 128,196 116,204 120,191 109,183 123,183"
           fill="#e94560" opacity="0.9"/>
</svg>
